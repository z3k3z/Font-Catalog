<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Fontopia-9000 McFonterson!</title>
        <link rel="stylesheet" href="/static/styles.css" />
        <link rel="icon" type="image/png" href="/static/favicon.png" />
        <style id="fontCatalogDynamicFontFaces"></style>
    </head>
    <body>
        <header class="app-header">
            <h1 class="app-title">Fontopia-9000 McFonterson!</h1>
            <div class="header-input-panel">
                <label class="card-sample-text-control">
                    <span class="header-input-label">Card sample</span>
                    <input
                        id="cardSampleTextInput"
                        type="text"
                        value="The quick brown fox 123"
                        placeholder="Sample text shown on font cards..."
                    />
                </label>

                <div class="search-panel">
                    <label>
                        <span class="header-input-label">Search</span>
                        <input
                            id="searchInput"
                            type="search"
                            placeholder="Add search term and press Enter..."
                        />
                    </label>

                    <div id="searchChipContainer" class="search-chip-container"></div>
                    <div id="fontCount" class="font-count"></div>
                </div>
            </div>

            <div id="searchChipContainer" class="search-chip-container"></div>
            <div id="fontCount" class="font-count"></div>
            <div class="app-header-controls">
                <button id="likedFontsButton" class="liked-fonts-button" type="button" title="Liked fonts">
                    🛒 <span id="likedFontsCount">0</span>
                </button>

                <nav class="app-menu">
                    <button class="app-menu-button" type="button">☰</button>

                    <div class="app-menu-panel">
                        <a href="/docs" target="_blank">Swagger Docs</a>
                        <a href="/redoc" target="_blank">ReDoc</a>

                        <div class="app-menu-divider"></div>

                        <a href="/api/about" target="_blank">About</a>
                    </div>
                </nav>
            </div>
        </header>

        <main>
            <section id="fontGrid" class="font-grid"></section>
        </main>

        <aside id="fontDetailPanel" class="font-detail-panel font-detail-panel--closed">
            <header class="font-detail-header">
                <div>
                    <h2 id="fontDetailTitle" class="font-detail-title"></h2>
                    <div id="fontDetailSubtitle" class="font-detail-subtitle"></div>
                </div>

                <button id="fontDetailCloseButton" class="font-detail-close-button" type="button">×</button>
            </header>

            <section class="font-detail-controls">
                <input
                    id="fontDetailSampleInput"
                    class="font-detail-sample-input"
                    type="text"
                    value="The quick brown fox 123"
                />
                <label class="font-detail-size-control">
                    Size
                    <div class="font-detail-size-row">
                        <input id="fontDetailSizeInput" type="range" min="16" max="96" value="40" />
                        <span id="fontDetailSizeValue">40px</span>
                    </div>
                </label>
                <div class="font-detail-preview-mode-switch" aria-label="Preview color mode">
                    <button
                        id="fontDetailDarkPreviewButton"
                        class="font-detail-preview-mode-button font-detail-preview-mode-button--selected"
                        type="button"
                    >
                        <span class="font-detail-preview-mode-swatch font-detail-preview-mode-swatch--dark"
                            >A</span
                        >
                    </button>

                    <button
                        id="fontDetailLightPreviewButton"
                        class="font-detail-preview-mode-button"
                        type="button"
                    >
                        <span class="font-detail-preview-mode-swatch font-detail-preview-mode-swatch--light"
                            >A</span
                        >
                    </button>
                </div>
            </section>

            <section id="fontDetailSample" class="font-detail-sample"></section>

            <section id="fontDetailGlyphSet" class="font-detail-glyph-set"></section>

            <footer class="font-detail-actions">
                <button id="fontDetailKeepButton" type="button">🥰 Likey</button>
                <button id="fontDetailCancelButton" type="button">🤮 No Likey</button>
            </footer>
        </aside>
        <script type="module" src="/static/app.js"></script>
    </body>
</html>
