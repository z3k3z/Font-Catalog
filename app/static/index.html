<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Font Catalog</title>
        <link rel="stylesheet" href="/static/styles.css" />
        <link rel="icon" type="image/png" href="/static/favicon.png" />
        <style id="fontCatalogDynamicFontFaces"></style>
    </head>
    <body>
        <header class="app-header">
            <h1>Font Catalog</h1>
            <div class="search-panel">
                <div id="searchChipContainer" class="search-chip-container"></div>
                <input id="searchInput" type="search" placeholder="Add search term and press Enter..." />
            </div>
            <div id="fontCount" class="font-count"></div>
        </header>

        <main>
            <section id="fontGrid" class="font-grid"></section>
        </main>

        <script type="module" src="/static/app.js"></script>
    </body>
</html>
